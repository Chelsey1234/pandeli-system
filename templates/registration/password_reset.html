{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandeli — Reset Password</title>
    {% include 'registration/includes/external_libs.html' %}
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .login-bg { background-image: url('{% static "core/images/bakeshop.jpeg" %}'); background-size:cover; background-position:center; background-attachment:fixed; }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center relative">
    <div class="absolute inset-0 bg-black/50 z-0"></div>
    <div class="relative z-10 w-full max-w-md mx-4 animate__animated animate__fadeIn">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            {% include 'registration/includes/brand_header.html' %}
            <div class="px-8 py-6">
                <h5 class="text-center font-semibold mb-1" style="color:#C98A6B;">Reset Password</h5>
                <p class="text-center text-gray-400 text-sm mb-5">Enter your email and we'll send you a reset link.</p>
                <form method="post" class="space-y-4">
                    {% csrf_token %}
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            <i class="fas fa-envelope mr-1 text-brand"></i>Email Address
                        </label>
                        <input type="email" name="email" placeholder="Enter your email" required autofocus
                               class="w-full px-4 py-2.5 text-sm rounded-xl border border-gray-200 focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none transition-all">
                    </div>
                    <button type="submit"
                            class="w-full flex items-center justify-between px-5 py-3 rounded-xl text-white font-semibold text-sm transition-all hover:-translate-y-0.5 hover:shadow-lg"
                            style="background:linear-gradient(135deg,#C98A6B,#a86b4e);">
                        <span>Send Reset Link</span>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
                <div class="text-center mt-4">
                    <a href="{% url 'login' %}" class="text-sm font-medium transition-colors" style="color:#C98A6B;">
                        <i class="fas fa-arrow-left mr-1"></i>Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
