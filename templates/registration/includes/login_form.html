<form method="post" action="{% url 'login' %}" class="space-y-4">
    {% csrf_token %}
    {% if request.GET.next %}
        <input type="hidden" name="next" value="{{ request.GET.next }}">
    {% endif %}

    <!-- Username -->
    <div class="animate__animated animate__fadeInLeft">
        <label for="username" class="block text-sm font-medium mb-1" style="color:rgba(255,255,255,0.9);">
            <i class="fas fa-user-circle mr-1"></i>Username
        </label>
        <input type="text" id="username" name="username"
               placeholder="Enter your username" required autofocus
               class="w-full px-4 py-2.5 text-sm rounded-xl outline-none transition-all"
               style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.35);color:#fff;backdrop-filter:blur(4px);"
               onfocus="this.style.background='rgba(255,255,255,0.3)';this.style.borderColor='rgba(255,255,255,0.7)'"
               onblur="this.style.background='rgba(255,255,255,0.2)';this.style.borderColor='rgba(255,255,255,0.35)'">
    </div>

    <!-- Password -->
    <div class="animate__animated animate__fadeInRight">
        <label for="password" class="block text-sm font-medium mb-1" style="color:rgba(255,255,255,0.9);">
            <i class="fas fa-lock mr-1"></i>Password
        </label>
        <div class="relative">
            <input type="password" id="password" name="password"
                   placeholder="Enter your password" required
                   class="w-full px-4 py-2.5 text-sm rounded-xl outline-none transition-all pr-10"
                   style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.35);color:#fff;backdrop-filter:blur(4px);"
                   onfocus="this.style.background='rgba(255,255,255,0.3)';this.style.borderColor='rgba(255,255,255,0.7)'"
                   onblur="this.style.background='rgba(255,255,255,0.2)';this.style.borderColor='rgba(255,255,255,0.35)'">
            <button type="button" onclick="togglePassword()"
                    tabindex="-1"
                    class="absolute right-3 top-1/2 -translate-y-1/2"
                    style="background:none;border:none;cursor:pointer;padding:4px;line-height:1;">
                <i class="fas fa-eye text-base" id="togglePasswordIcon"
                   style="color:#7C4A2D;text-shadow:0 0 4px rgba(255,255,255,0.8);"></i>
            </button>
        </div>
    </div>

    <!-- Remember / Forgot -->
    <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 cursor-pointer" style="color:rgba(255,255,255,0.85);">
            <input type="checkbox" name="remember_me" id="rememberMe"
                   class="w-4 h-4 rounded border-white/30 accent-white">
            Remember me
        </label>
        <a href="{% url 'password_reset' %}"
           class="font-medium transition-colors"
           style="color:rgba(255,255,255,0.85);"
           onmouseover="this.style.color='#fff'"
           onmouseout="this.style.color='rgba(255,255,255,0.85)'">
            <i class="fas fa-question-circle mr-1"></i>Forgot Password?
        </a>
    </div>

    <!-- Submit — centered -->
    <div class="flex justify-center pt-1">
        <button type="submit"
                class="flex items-center justify-center gap-3 px-10 py-3 rounded-xl text-white font-semibold text-sm transition-all hover:-translate-y-0.5 hover:shadow-xl"
                style="background:linear-gradient(135deg,#C98A6B,#a86b4e);
                       box-shadow:0 4px 16px rgba(201,138,107,0.5);
                       min-width:180px;">
            <span>Sign In</span>
            <i class="fas fa-arrow-right"></i>
        </button>
    </div>
</form>

<style>
/* Placeholder color for glass inputs */
#username::placeholder, #password::placeholder { color: rgba(255,255,255,0.5); }
</style>

<script>
function togglePassword() {
    var input = document.getElementById('password');
    var icon  = document.getElementById('togglePasswordIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
