<div class="mt-5 rounded-xl border border-gray-100 bg-gray-50 p-4 animate__animated animate__fadeInUp animate__delay-2s">
    <h6 class="text-center text-sm font-semibold text-gray-600 mb-3">
        <i class="fas fa-info-circle mr-1"></i>Demo Credentials
    </h6>

    <!-- Admin -->
    <div class="flex items-center gap-3 bg-white rounded-xl px-4 py-3 mb-2 border border-gray-100 shadow-sm">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:rgba(201,138,107,0.15);">
            <i class="fas fa-user-shield text-sm" style="color:#C98A6B;"></i>
        </div>
        <div class="flex-1 min-w-0">
            <span class="block text-xs font-semibold text-gray-500 uppercase tracking-wide">Administrator</span>
            <div class="flex items-center gap-2 mt-0.5">
                <code class="text-xs bg-gray-100 px-1.5 py-0.5 rounded text-gray-700">admin</code>
                <span class="text-gray-300">•</span>
                <code class="text-xs bg-gray-100 px-1.5 py-0.5 rounded text-gray-700">admin123</code>
            </div>
        </div>
        <button onclick="copyCredentials('admin', 'admin123')" title="Copy credentials"
                class="p-1.5 rounded-lg text-gray-400 hover:text-brand hover:bg-gray-100 transition-colors flex-shrink-0">
            <i class="fas fa-copy text-xs"></i>
        </button>
    </div>

    <!-- Production Admin -->
    <div class="flex items-center gap-3 bg-white rounded-xl px-4 py-3 border border-gray-100 shadow-sm">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:rgba(72,187,120,0.15);">
            <i class="fas fa-user-cog text-sm text-green-600"></i>
        </div>
        <div class="flex-1 min-w-0">
            <span class="block text-xs font-semibold text-gray-500 uppercase tracking-wide">Production Admin</span>
            <div class="flex items-center gap-2 mt-0.5">
                <code class="text-xs bg-gray-100 px-1.5 py-0.5 rounded text-gray-700">production_admin</code>
                <span class="text-gray-300">•</span>
                <code class="text-xs bg-gray-100 px-1.5 py-0.5 rounded text-gray-700">prod123</code>
            </div>
        </div>
        <button onclick="copyCredentials('production_admin', 'prod123')" title="Copy credentials"
                class="p-1.5 rounded-lg text-gray-400 hover:text-brand hover:bg-gray-100 transition-colors flex-shrink-0">
            <i class="fas fa-copy text-xs"></i>
        </button>
    </div>
</div>
