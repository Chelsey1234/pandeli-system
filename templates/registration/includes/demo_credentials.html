<div class="demo-credentials animate__animated animate__fadeInUp animate__delay-2s">
    <h6 class="text-center mb-3">
        <i class="fas fa-info-circle me-2"></i>Demo Credentials
    </h6>
    
    <div class="credential-item admin-credential">
        <div class="credential-icon">
            <i class="fas fa-user-shield"></i>
        </div>
        <div class="credential-details">
            <span class="role-badge">Administrator</span>
            <div class="credential-values">
                <code>admin</code>
                <span class="separator">•</span>
                <code>admin123</code>
            </div>
        </div>
        <button class="copy-btn" onclick="copyCredentials('admin', 'admin123')" title="Copy credentials">
            <i class="fas fa-copy"></i>
        </button>
    </div>
    
    <div class="credential-item production-credential">
        <div class="credential-icon">
            <i class="fas fa-user-cog"></i>
        </div>
        <div class="credential-details">
            <span class="role-badge">Production Admin</span>
            <div class="credential-values">
                <code>production_admin</code>
                <span class="separator">•</span>
                <code>prod123</code>
            </div>
        </div>
        <button class="copy-btn" onclick="copyCredentials('production_admin', 'prod123')" title="Copy credentials">
            <i class="fas fa-copy"></i>
        </button>
    </div>
</div>
