{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandeli — Sign In</title>
    {% include 'registration/includes/external_libs.html' %}
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .login-bg {
            background-image: url('{% static "core/images/bakeshop.jpeg" %}');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center relative">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/50 z-0"></div>

    <!-- Card — glassmorphism over terracotta -->
    <div class="relative z-10 w-full max-w-md mx-4 animate__animated animate__fadeIn">
        <div class="rounded-2xl overflow-hidden"
             style="background:rgba(201,138,107,0.35);
                    backdrop-filter:blur(40px);
                    -webkit-backdrop-filter:blur(40px);
                    border:1px solid rgba(255,255,255,0.25);
                    box-shadow:0 8px 40px rgba(124,74,45,0.35), inset 0 1px 0 rgba(255,255,255,0.2);">

            <!-- Brand header -->
            {% include 'registration/includes/brand_header.html' %}

            <div class="px-8 pb-8">
                <!-- Messages -->
                {% include 'registration/includes/messages.html' %}

                <!-- Form -->
                {% include 'registration/includes/login_form.html' %}
            </div>
        </div>
    </div>

    <script src="{% static 'core/js/login.js' %}"></script>
</body>
</html>
