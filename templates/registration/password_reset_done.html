{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandeli — Email Sent</title>
    {% include 'registration/includes/external_libs.html' %}
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .login-bg { background-image: url('{% static "core/images/bakeshop.jpeg" %}'); background-size:cover; background-position:center; background-attachment:fixed; }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center relative">
    <div class="absolute inset-0 bg-black/50 z-0"></div>
    <div class="relative z-10 w-full max-w-md mx-4 animate__animated animate__fadeIn">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden text-center">
            {% include 'registration/includes/brand_header.html' %}
            <div class="px-8 py-8">
                <i class="fas fa-envelope-open-text text-4xl mb-4 block" style="color:#C98A6B;"></i>
                <h5 class="font-semibold text-lg mb-2" style="color:#C98A6B;">Check your email</h5>
                <p class="text-gray-400 text-sm mb-6">
                    We've sent a password reset link to your email. Check your inbox (and spam folder).
                </p>
                <a href="{% url 'login' %}"
                   class="inline-flex items-center justify-between w-full px-5 py-3 rounded-xl text-white font-semibold text-sm transition-all hover:-translate-y-0.5 hover:shadow-lg"
                   style="background:linear-gradient(135deg,#C98A6B,#a86b4e);">
                    <span>Back to Login</span>
                    <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
