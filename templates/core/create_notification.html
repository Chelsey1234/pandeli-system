{% extends 'core/base.html' %}

{% block title %}Create Notification{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-5">
    <!-- Form Card -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="flex items-center gap-2 px-5 py-4 border-b border-gray-100 text-white" style="background:#C98A6B;">
            <i class="fas fa-bullhorn"></i>
            <h5 class="font-semibold">Create Bulk Notification</h5>
        </div>
        <div class="p-5">
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Notification Title</label>
                    <input type="text" id="title" name="title" required
                           class="w-full px-3 py-2 text-sm rounded-xl border border-gray-200 focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none">
                </div>
                <div>
                    <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                    <textarea id="message" name="message" rows="4" required
                              class="w-full px-3 py-2 text-sm rounded-xl border border-gray-200 focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none resize-none"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="notification_type" class="block text-sm font-medium text-gray-700 mb-1">Notification Type</label>
                        <select id="notification_type" name="notification_type"
                                class="w-full px-3 py-2 text-sm rounded-xl border border-gray-200 focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none">
                            <option value="system">System</option>
                            <option value="order">Order</option>
                            <option value="stock">Stock</option>
                            <option value="promo">Promotion</option>
                        </select>
                    </div>
                    <div>
                        <label for="recipient_type" class="block text-sm font-medium text-gray-700 mb-1">Send To</label>
                        <select id="recipient_type" name="recipient_type"
                                class="w-full px-3 py-2 text-sm rounded-xl border border-gray-200 focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none">
                            <option value="all_admins">All Administrators</option>
                            <option value="all_staff">All Staff</option>
                        </select>
                    </div>
                </div>
                <div class="flex flex-col gap-2 pt-1">
                    <button type="submit"
                            class="w-full py-2.5 text-sm rounded-xl text-white font-semibold hover:-translate-y-0.5 transition-all"
                            style="background:#C98A6B;">
                        <i class="fas fa-paper-plane mr-1"></i> Send Notification
                    </button>
                    <a href="{% url 'messages' %}"
                       class="w-full py-2.5 text-sm rounded-xl bg-gray-100 text-gray-600 hover:bg-gray-200 font-medium transition-colors text-center">
                        <i class="fas fa-arrow-left mr-1"></i> Back to Messages
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="flex items-center gap-2 px-5 py-4 border-b border-gray-100 text-white" style="background:#3182ce;">
            <i class="fas fa-bolt"></i>
            <h5 class="font-semibold">Quick Actions</h5>
        </div>
        <div class="p-5">
            <form method="post" action="{% url 'trigger_low_stock_check' %}">
                {% csrf_token %}
                <button type="submit"
                        class="px-4 py-2 text-sm rounded-xl text-white font-medium hover:-translate-y-0.5 transition-all"
                        style="background:#d69e2e;">
                    <i class="fas fa-exclamation-triangle mr-1"></i> Check Low Stock Now
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
