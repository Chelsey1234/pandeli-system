<div class="card overflow-hidden" style="animation:fadeUp 0.5s ease 0.2s both;">
    <div class="card-header">
        <span class="card-title flex items-center gap-2">
            <i class="fas fa-trophy" style="color:#C98A6B;"></i> Top Products
        </span>
        <div class="flex gap-2">
            <select class="form-input" style="width:auto;padding:0.25rem 0.5rem;font-size:0.75rem;"
                    id="productPeriod" onchange="ProductsChartManager.changePeriod(this.value)">
                <option value="7">7 Days</option>
                <option value="30" selected>30 Days</option>
                <option value="90">90 Days</option>
            </select>
            <select class="form-input" style="width:auto;padding:0.25rem 0.5rem;font-size:0.75rem;"
                    id="productChartType" onchange="ProductsChartManager.toggleType()">
                <option value="sales">Sales (&#8369;)</option>
                <option value="quantity">Quantity</option>
            </select>
        </div>
    </div>
    <div class="card-body">
        <div style="position:relative; min-height:260px;">
            <canvas id="topProductsChart"></canvas>
        </div>
        <div id="productsNoData" class="hidden text-center py-10 muted-text">
            <i class="fas fa-box-open text-3xl mb-3 block" style="color:#e8d5c8;"></i>
            No product data for selected period
        </div>
    </div>
</div>
