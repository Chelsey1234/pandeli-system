<div class="card overflow-hidden" style="animation:fadeUp 0.5s ease 0.2s both;">
    <div class="card-header">
        <span class="card-title flex items-center gap-2">
            <i class="fas fa-trophy" style="color:#C98A6B;"></i> Top Products
        </span>
        <div class="flex items-center gap-2">
            <!-- Period filter -->
            <div class="flex gap-1" id="prodPeriodBtns">
                <button class="btn-chart-range" onclick="prodSetPeriod(this, 7)">7d</button>
                <button class="btn-chart-range btn-chart-active" onclick="prodSetPeriod(this, 30)">30d</button>
                <button class="btn-chart-range" onclick="prodSetPeriod(this, 90)">90d</button>
            </div>
            <!-- Metric filter -->
            <div class="flex gap-1" id="prodMetricBtns">
                <button class="btn-chart-range btn-chart-active" onclick="prodSetMetric(this, 'sales')">&#8369;</button>
                <button class="btn-chart-range" onclick="prodSetMetric(this, 'quantity')">Qty</button>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div style="position:relative; min-height:260px;">
            <canvas id="topProductsChart"></canvas>
        </div>
        <div id="productsNoData" class="hidden text-center py-10 muted-text">
            <i class="fas fa-box-open text-3xl mb-3 block" style="color:#e8d5c8;"></i>
            No product data for selected period
        </div>
    </div>
</div>

<script>
function prodSetPeriod(btn, days) {
    document.querySelectorAll('#prodPeriodBtns .btn-chart-range').forEach(function(b) { b.classList.remove('btn-chart-active'); });
    btn.classList.add('btn-chart-active');
    ProductsChartManager.changePeriod(days);
}
function prodSetMetric(btn, type) {
    document.querySelectorAll('#prodMetricBtns .btn-chart-range').forEach(function(b) { b.classList.remove('btn-chart-active'); });
    btn.classList.add('btn-chart-active');
    ProductsChartManager.setType(type);
}
</script>
