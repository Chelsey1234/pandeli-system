<div class="card overflow-hidden" style="animation:fadeUp 0.5s ease 0.15s both;">
    <div class="card-header">
        <span class="card-title flex items-center gap-2">
            <i class="fas fa-chart-pie" style="color:#C98A6B;"></i> Sales by Category
        </span>
        <div class="flex items-center gap-2">
            <!-- Period filter -->
            <div class="flex gap-1" id="catPeriodBtns">
                <button class="btn-chart-range btn-chart-active" onclick="catSetPeriod(this, 7)">7d</button>
                <button class="btn-chart-range" onclick="catSetPeriod(this, 30)">30d</button>
                <button class="btn-chart-range" onclick="catSetPeriod(this, 90)">90d</button>
            </div>
            <!-- Metric filter -->
            <div class="flex gap-1" id="catMetricBtns">
                <button class="btn-chart-range btn-chart-active" onclick="catSetMetric(this, 'sales')">&#8369;</button>
                <button class="btn-chart-range" onclick="catSetMetric(this, 'quantity')">Qty</button>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div style="position:relative; min-height:260px;">
            <canvas id="categoryBarChart"></canvas>
        </div>
        <div id="categoryNoData" class="hidden text-center py-10 muted-text">
            <i class="fas fa-chart-bar text-3xl mb-3 block" style="color:#e8d5c8;"></i>
            No data for selected period
        </div>
    </div>
</div>

<script>
function catSetPeriod(btn, days) {
    document.querySelectorAll('#catPeriodBtns .btn-chart-range').forEach(function(b) { b.classList.remove('btn-chart-active'); });
    btn.classList.add('btn-chart-active');
    CategoryChartManager.changePeriod(days);
}
function catSetMetric(btn, type) {
    document.querySelectorAll('#catMetricBtns .btn-chart-range').forEach(function(b) { b.classList.remove('btn-chart-active'); });
    btn.classList.add('btn-chart-active');
    CategoryChartManager.setType(type);
}
</script>
