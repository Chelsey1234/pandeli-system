<div class="card">
    <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center">
        <h5 class="mb-0">
            <i class="fas fa-exclamation-triangle me-2"></i>
            Low Stock Alert
        </h5>
        <a href="{% url 'inventory_status' %}" class="btn btn-sm btn-light">
            View All <i class="fas fa-arrow-right ms-1"></i>
        </a>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Current Stock</th>
                        <th>Threshold</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for product in low_stock_products %}
                        <tr>
                            <td class="fw-bold">{{ product.name }}</td>
                            <td>
                                <span class="badge bg-danger bg-opacity-10 text-danger px-3 py-2">
                                    {{ product.stock }}
                                </span>
                            </td>
                            <td>{{ product.low_stock_threshold }}</td>
                            <td>
                                <div class="progress" style="height: 8px; width: 100px;">
                                    <div class="progress-bar bg-danger" 
                                         style="width: {% widthratio product.stock product.low_stock_threshold 100 %}%"></div>
                                </div>
                            </td>
                            <td>
                                <a href="{% url 'inventory_status' %}?product={{ product.id }}" 
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-plus-circle"></i> Restock
                                </a>
                            </td>
                        </tr>
                    {% empty %}
                        <tr>
                            <td colspan="5" class="text-center py-4">
                                <i class="fas fa-check-circle fa-2x text-success mb-2"></i>
                                <p class="text-muted mb-0">No low stock items</p>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
