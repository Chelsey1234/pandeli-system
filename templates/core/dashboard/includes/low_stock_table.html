<div class="bg-white rounded-2xl shadow-sm overflow-hidden" style="border:1px solid #ecddd5;">
    <div class="flex items-center justify-between px-5 py-4"
         style="border-bottom:1px solid #f0e0d6;">
        <h5 class="font-semibold flex items-center gap-2" style="color:#3d2010;">
            <i class="fas fa-exclamation-triangle" style="color:#C98A6B;"></i> Low Stock Alert
        </h5>
        <a href="{% url 'inventory_status' %}"
           class="px-3 py-1 text-xs rounded-lg font-medium transition-colors"
           style="background:#fdf5f0; color:#7C4A2D; border:1px solid #ecddd5;"
           onmouseover="this.style.background='#ecddd5'"
           onmouseout="this.style.background='#fdf5f0'">
            View All <i class="fas fa-arrow-right ml-1"></i>
        </a>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full text-sm">
            <thead>
                <tr class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide">
                    <th class="px-4 py-3 text-left font-semibold">Product</th>
                    <th class="px-4 py-3 text-left font-semibold">Stock</th>
                    <th class="px-4 py-3 text-left font-semibold">Threshold</th>
                    <th class="px-4 py-3 text-left font-semibold">Level</th>
                    <th class="px-4 py-3 text-left font-semibold">Action</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-50">
                {% for product in low_stock_products %}
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-4 py-3 font-semibold text-gray-800">{{ product.name }}</td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700">
                            {{ product.stock }}
                        </span>
                    </td>
                    <td class="px-4 py-3 text-gray-500">{{ product.low_stock_threshold }}</td>
                    <td class="px-4 py-3">
                        <div class="w-24 bg-gray-200 rounded-full h-2">
                            <div class="bg-red-500 h-2 rounded-full"
                                 style="width: {% widthratio product.stock product.low_stock_threshold 100 %}%"></div>
                        </div>
                    </td>
                    <td class="px-4 py-3">
                        <a href="{% url 'inventory_status' %}?product={{ product.id }}"
                           class="px-3 py-1 text-xs rounded-lg border border-brand text-brand hover:bg-brand hover:text-white transition-colors">
                            <i class="fas fa-plus-circle mr-1"></i> Restock
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="5" class="px-4 py-8 text-center text-gray-400">
                        <i class="fas fa-check-circle text-green-500 text-2xl mb-2 block"></i>
                        No low stock items
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
