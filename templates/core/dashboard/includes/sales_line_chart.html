<div class="card overflow-hidden" style="animation:fadeUp 0.5s ease both;">
    <div class="card-header">
        <span class="card-title flex items-center gap-2">
            <i class="fas fa-chart-line" style="color:#C98A6B;"></i> Sales Trend
        </span>
        <div class="flex gap-1">
            <button class="btn-chart-range btn-chart-active" data-range="7"
                    onclick="LineChartManager.refresh(7); document.querySelectorAll('.btn-chart-range').forEach(b=>b.classList.remove('btn-chart-active')); this.classList.add('btn-chart-active');">
                7d
            </button>
            <button class="btn-chart-range" data-range="14"
                    onclick="LineChartManager.refresh(14); document.querySelectorAll('.btn-chart-range').forEach(b=>b.classList.remove('btn-chart-active')); this.classList.add('btn-chart-active');">
                14d
            </button>
            <button class="btn-chart-range" data-range="30"
                    onclick="LineChartManager.refresh(30); document.querySelectorAll('.btn-chart-range').forEach(b=>b.classList.remove('btn-chart-active')); this.classList.add('btn-chart-active');">
                30d
            </button>
            <button class="btn-chart-range" title="Refresh" onclick="LineChartManager.refresh()">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>
    <div class="card-body">
        <div style="position:relative; min-height:260px;">
            <canvas id="salesLineChart"></canvas>
        </div>
        <div id="lineChartNoData" class="hidden text-center py-10 muted-text">
            <i class="fas fa-chart-line text-3xl mb-3 block" style="color:#e8d5c8;"></i>
            No sales data available for this period
        </div>
    </div>
</div>
