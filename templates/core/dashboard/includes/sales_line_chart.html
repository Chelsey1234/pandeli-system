<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">
            <i class="fas fa-chart-line me-2 text-primary"></i>
            Sales Trend
        </h5>
        <div class="btn-group" role="group">
            <button class="btn btn-sm btn-outline-secondary" onclick="LineChartManager.refresh(7)">7d</button>
            <button class="btn btn-sm btn-outline-secondary" onclick="LineChartManager.refresh(14)">14d</button>
            <button class="btn btn-sm btn-outline-secondary" onclick="LineChartManager.refresh(30)">30d</button>
            <button class="btn btn-sm btn-outline-primary" onclick="LineChartManager.refresh()">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>
    <div class="card-body">
        <div class="chart-container" style="min-height: 280px; position: relative;">
            <canvas id="salesLineChart"></canvas>
        </div>
        <div id="lineChartNoData" class="text-center py-5 text-muted" style="display: none;">
            <i class="fas fa-chart-line fa-3x mb-3"></i>
            <p>No sales data available for this period</p>
        </div>
    </div>
</div>
