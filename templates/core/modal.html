<!-- Add Product Modal (Bootstrap JS modal API) -->
<div class="modal fade" id="addProductModal" tabindex="-1" style="display:none;">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-2xl overflow-hidden border-0 shadow-2xl">
            <div class="flex items-center justify-between px-6 py-4 text-white" style="background:#C98A6B;">
                <h5 class="font-semibold">Add New Product</h5>
                <button type="button" class="text-white/70 hover:text-white" data-bs-dismiss="modal">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <div class="p-6 bg-white space-y-4">
                <form id="addProductForm">
                    {% csrf_token %}
                    <div>
                        <label for="productName" class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                        <input type="text" id="productName" name="name" required
                               class="w-full px-3 py-2 text-sm rounded-xl border border-gray-200 focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none">
                    </div>
                    <div>
                        <label for="productPrice" class="block text-sm font-medium text-gray-700 mb-1">Price</label>
                        <input type="number" id="productPrice" name="price" min="0" step="0.01" required
                               class="w-full px-3 py-2 text-sm rounded-xl border border-gray-200 focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none">
                    </div>
                    <div>
                        <label for="productStock" class="block text-sm font-medium text-gray-700 mb-1">Stock</label>
                        <input type="number" id="productStock" name="stock" min="0" required
                               class="w-full px-3 py-2 text-sm rounded-xl border border-gray-200 focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none">
                    </div>
                </form>
            </div>
            <div class="flex items-center justify-end gap-3 px-6 py-4 bg-gray-50 border-t border-gray-100">
                <button type="button" data-bs-dismiss="modal"
                        class="px-4 py-2 text-sm rounded-xl bg-gray-100 text-gray-600 hover:bg-gray-200 font-medium transition-colors">
                    Cancel
                </button>
                <button type="button" id="saveProduct"
                        class="px-4 py-2 text-sm rounded-xl text-white font-medium hover:-translate-y-0.5 transition-all"
                        style="background:#C98A6B;">
                    Add Product
                </button>
            </div>
        </div>
    </div>
</div>
