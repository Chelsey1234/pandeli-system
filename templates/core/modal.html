<!-- Add Product Modal -->
<div class="modal fade" id="addProductModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Product</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addProductForm">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="productName">Product Name</label>
                        <input type="text" class="form-control" id="productName" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="productPrice">Price</label>
                        <input type="number" class="form-control" id="productPrice" name="price" min="0" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label for="productStock">Stock</label>
                        <input type="number" class="form-control" id="productStock" name="stock" min="0" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveProduct">Add Product</button>
            </div>
        </div>
    </div>
</div>
